<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>ユーザ情報更新</title>
    <link type="text/css" charset="UTF-8" href="/css/reset.css" rel="stylesheet" />
    <link type="text/css" charset="UTF-8" href="/css/nablarch_sample.css" rel="stylesheet" />
    <style type="text/css">
        span.leftSpace {
            margin-left: 0.5em;
        }
        table.inputArea th {
            width:300px;
        }
        table.inputArea td {
            width:400px;
        }
    </style>
</head>

<body>
<div id="wrapper">

    <div id="hwrapper">
        <div id="headerEtc">
            <form>
                名前：リクエスト単体テストユーザ
                <span class="headerLeftSpace">日付：2011/2/15</span>
                <span class="headerLeftSpace"><a class="logout" href="">トップメニュー</a></span>
                <span class="headerLeftSpace"><a class="logout" href="">ログアウト</a></span>
            </form>
        </div>
        <div id="headerTitle">Nablarch Sample Application</div>
        <div id="appHeader">ユーザ情報更新</div>
    </div>

    <div id="mainContents">
        <div id="mainContentsInner">
            <form>
                <table class="zero" width="710">
                    <tr>
                        <td colspan="2">
                            <p class="areaTitle">ユーザ基本情報</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" valign="top">
                            <table class="data inputArea" width="700">
                                
                                <tr>
                                    <th>
                                        ユーザID
                                    </th>
                                    <td>
                                        0000000001
                                    </td>
                                </tr>
                                <tr>
                                    <th>
                                        <span class="essential">*</span>漢字氏名<span class="instruct">(全角50文字)</span>
                                    </th>
                                    <td>
                                        <input type="text" name="kanjiName" value="" size="70" maxlength="50" />
                                    </td>
                                </tr>
                                <tr>
                                    <th>
                                        <span class="essential">*</span>カナ氏名<span class="instruct">(全角カナ50文字)</span>
                                    </th>
                                    <td>
                                        <input type="text" name="kanaName" value="" size="70" maxlength="50" />
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td align="right">
                            <input class="buttons" type="button" name="confirm" value="確認" />
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>
    <div id="footer">
        <form>
            <ul class="footerList">
                <li><a href="">トップメニュー</a></li>
                <li><a href="">ユーザ情報一覧照会</a></li>
            </ul>
        </form>
    </div>
</div>
</body>
</html>
