name: Collect Metrics

on:
  schedule:
    - cron: '0 15 * * 6'  # Sunday 00:00 JST (Saturday 15:00 UTC)
  workflow_dispatch:  # allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: read  # Required for gh api .../issues (MTTR and Issues chart data)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log origin/main (first commit date)
      - name: Collect metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NABLEDGE_TOKEN: ${{ secrets.NABLEDGE_TOKEN }}
        run: |
          set -e
          python tools/metrics/collect.py
      - name: Create PR with updated metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git add docs/metrics.md
          if git diff --staged --quiet; then
            echo "No changes to metrics.md, skipping PR creation."
            exit 0
          fi
          DATE=$(date +%Y%m%d)
          BRANCH="chore/update-metrics-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git commit -m "chore: update metrics report"
          if ! git push origin "${BRANCH}"; then
            echo "Branch ${BRANCH} already exists on remote. Checking for open PR..."
            if gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number' | grep -q .; then
              echo "PR already open for ${BRANCH}, skipping."
            else
              echo "No open PR found. Creating PR for existing branch..."
              FALLBACK_PR_URL=$(gh pr create \
                --title "chore: update metrics report (${DATE})" \
                --body "Automated weekly metrics update. Auto-generated by the Collect Metrics workflow." \
                --label documentation \
                --base main \
                --head "${BRANCH}")
              echo "PR created: ${FALLBACK_PR_URL}"
              gh pr merge "${FALLBACK_PR_URL}" --squash --delete-branch
              echo "Merged: ${FALLBACK_PR_URL}"
            fi
            exit 0
          fi
          PR_URL=$(gh pr create \
            --title "chore: update metrics report (${DATE})" \
            --body "Automated weekly metrics update. Auto-generated by the Collect Metrics workflow." \
            --label documentation \
            --base main \
            --head "${BRANCH}")
          echo "PR created: ${PR_URL}"
          gh pr merge "${PR_URL}" --squash --delete-branch
          echo "Merged: ${PR_URL}"
