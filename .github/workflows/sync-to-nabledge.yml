name: Sync to nabledge repository

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (dry-run without actual push)'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nabledge-dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout nabledge repository
        uses: actions/checkout@v4
        with:
          repository: nablarch/nabledge
          ref: develop
          token: ${{ secrets.NABLEDGE_SYNC_TOKEN }}
          path: nabledge-repo

      - name: Clean nabledge repository
        run: .github/scripts/clean-repository.sh nabledge-repo

      - name: Transform to plugin structure
        run: |
          # Use transform script
          .github/scripts/transform-to-plugin.sh . nabledge-repo

      - name: Validate marketplace structure
        run: .github/scripts/validate-marketplace.sh nabledge-repo

      - name: Capture and transform commit message
        id: commit_message
        run: |
          .github/scripts/capture-commit-message.sh \
            "${{ github.sha }}" \
            "${{ github.event.head_commit.message }}"

      - name: Build commit body with trigger information
        run: |
          .github/scripts/build-commit-body.sh \
            "${{ github.repository }}" \
            "${{ github.sha }}" \
            "$COMMIT_BODY"

      - name: Display transformed commit message (test mode)
        if: ${{ github.event.inputs.test_mode == 'true' }}
        run: |
          echo "=== Test Mode: Commit Message Transformation ==="
          echo ""
          echo "Subject:"
          echo "$COMMIT_SUBJECT"
          echo ""
          echo "Body:"
          echo "$FULL_COMMIT_BODY"
          echo ""
          echo "Push to nabledge repository: SKIPPED (test mode)"

      - name: Commit and Push to nabledge
        if: ${{ github.event.inputs.test_mode != 'true' }}
        working-directory: nabledge-repo
        run: |
          ../.github/scripts/commit-and-push.sh \
            "$COMMIT_SUBJECT" \
            "$FULL_COMMIT_BODY" \
            "develop"
