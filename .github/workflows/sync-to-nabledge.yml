name: Sync to nabledge repository

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nabledge-dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout nabledge repository
        uses: actions/checkout@v4
        with:
          repository: nablarch/nabledge
          ref: develop
          token: ${{ secrets.NABLEDGE_SYNC_TOKEN }}
          path: nabledge-repo

      - name: Clean nabledge repository
        run: .github/scripts/clean-repository.sh nabledge-repo

      - name: Clean up development infrastructure files
        run: |
          echo "Removing development infrastructure files from nabledge repository..."
          # Remove .github/workflows and .github/scripts if they exist
          if [ -d "nabledge-repo/plugins/nabledge-6/.github/workflows" ]; then
            echo "Removing plugins/nabledge-6/.github/workflows"
            rm -rf "nabledge-repo/plugins/nabledge-6/.github/workflows"
          fi
          if [ -d "nabledge-repo/plugins/nabledge-6/.github/scripts" ]; then
            echo "Removing plugins/nabledge-6/.github/scripts"
            rm -rf "nabledge-repo/plugins/nabledge-6/.github/scripts"
          fi
          echo "Cleanup complete"

      - name: Transform to plugin structure
        run: |
          # Use transform script
          .github/scripts/transform-to-plugin.sh . nabledge-repo

      - name: Validate marketplace structure
        run: .github/scripts/validate-marketplace.sh nabledge-repo

      - name: Capture and transform commit message
        id: commit_message
        run: |
          .github/scripts/capture-commit-message.sh \
            "${{ github.sha }}" \
            "${{ github.event.head_commit.message }}"

      - name: Build commit body with trigger information
        run: |
          .github/scripts/build-commit-body.sh \
            "${{ github.repository }}" \
            "${{ github.sha }}" \
            "$COMMIT_BODY"

      - name: Display commit message for verification
        run: |
          echo "::notice::Syncing commit to nabledge repository"
          echo "Subject: $COMMIT_SUBJECT"
          echo "Body preview: ${FULL_COMMIT_BODY:0:200}..."

      - name: Commit and Push to nabledge
        working-directory: nabledge-repo
        run: |
          ../.github/scripts/commit-and-push.sh \
            "$COMMIT_SUBJECT" \
            "$FULL_COMMIT_BODY" \
            "develop"
